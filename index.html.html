<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registro de entrenamiento TKD</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  :root{
    --surface-0:#f4f4f2;--surface-1:#f0efeb;--surface-2:#ffffff;
    --text-primary:#0b0b0b;--text-secondary:#52514e;--text-muted:#898781;
    --border:rgba(11,11,11,0.10);--border-strong:rgba(11,11,11,0.18);
    --fill-accent:#185fa5;--fill-accent-hover:#0c447c;
    --bg-accent:#e6f1fb;--text-accent:#185fa5;--border-accent:#85b7eb;
    --bg-danger:#fcebeb;--text-danger:#a32d2d;--border-danger:#f09595;
    --fill-danger:#e24b4a;
    --bg-warning:#faeeda;--text-warning:#854f0b;
    --radius:8px;
    --font-sans:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  }
  @media(prefers-color-scheme:dark){
    :root{
      --surface-0:#111110;--surface-1:#1a1a19;--surface-2:#242422;
      --text-primary:#ffffff;--text-secondary:#c3c2b7;--text-muted:#898781;
      --border:rgba(255,255,255,0.10);--border-strong:rgba(255,255,255,0.18);
      --fill-accent:#3987e5;--fill-accent-hover:#2a78d6;
      --bg-accent:#0c2d52;--text-accent:#85b7eb;--border-accent:#185fa5;
      --bg-danger:#2d1010;--text-danger:#f09595;--border-danger:#791f1f;
      --fill-danger:#e24b4a;
      --bg-warning:#2a1a04;--text-warning:#fac775;
    }
  }
  body{font-family:var(--font-sans);background:var(--surface-0);color:var(--text-primary);min-height:100vh;padding:0}
  .header{background:var(--surface-2);border-bottom:0.5px solid var(--border);padding:14px 24px;display:flex;align-items:center;gap:10px}
  .header-icon{width:32px;height:32px;background:#e34948;border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:16px;font-weight:700}
  .header h1{font-size:16px;font-weight:500;color:var(--text-primary)}
  .header p{font-size:12px;color:var(--text-muted);margin-top:1px}
  .container{max-width:720px;margin:0 auto;padding:24px 16px}
  .tabs{display:flex;gap:4px;margin-bottom:1.5rem;border-bottom:0.5px solid var(--border);padding-bottom:0}
  .tab{padding:8px 16px;font-size:14px;font-weight:500;color:var(--text-secondary);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-0.5px;background:none;border-top:none;border-left:none;border-right:none;font-family:var(--font-sans)}
  .tab.active{color:var(--fill-accent);border-bottom-color:var(--fill-accent)}
  .info-bar{background:var(--surface-1);border:0.5px solid var(--border);border-radius:var(--radius);padding:10px 14px;margin-bottom:1.25rem;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
  .info-chip{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--text-secondary)}
  .info-chip strong{color:var(--text-primary);font-weight:500}
  .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
  .form-group{display:flex;flex-direction:column;gap:6px}
  .form-group.full{grid-column:1/-1}
  label{font-size:13px;color:var(--text-secondary);font-weight:500}
  input[type=number],select,textarea{
    width:100%;padding:8px 10px;font-size:14px;border:0.5px solid var(--border-strong);
    border-radius:var(--radius);background:var(--surface-2);color:var(--text-primary);
    font-family:var(--font-sans);outline:none;
  }
  input[type=number]:focus,select:focus,textarea:focus{border-color:var(--fill-accent)}
  input[type=range]{width:100%;accent-color:var(--fill-accent);cursor:pointer}
  .rpe-row{display:flex;align-items:center;gap:10px}
  .rpe-row input[type=range]{flex:1}
  .rpe-val{font-size:18px;font-weight:500;min-width:24px;color:var(--text-primary)}
  .rpe-desc{font-size:12px;color:var(--text-muted);margin-top:2px}
  .type-btns{display:flex;flex-wrap:wrap;gap:6px}
  .type-btn{padding:6px 12px;font-size:13px;border:0.5px solid var(--border-strong);border-radius:var(--radius);cursor:pointer;background:none;color:var(--text-secondary);transition:all .15s;font-family:var(--font-sans)}
  .type-btn.selected{border-color:transparent;color:#fff;font-weight:500}
  .health-row{display:flex;gap:16px;align-items:center;margin-top:4px}
  .health-opt{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--text-secondary);cursor:pointer}
  .health-opt input{accent-color:var(--fill-accent)}
  .injury-panel{border:0.5px solid var(--border-danger);border-radius:var(--radius);padding:12px 14px;margin-top:10px;background:var(--bg-danger)}
  .injury-panel > label{color:var(--text-danger);font-size:12px;margin-bottom:8px;display:block;font-weight:500}
  .tipo-lesion-btns{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px}
  .tl-btn{padding:5px 11px;font-size:12px;border:0.5px solid var(--border-danger);border-radius:var(--radius);cursor:pointer;background:none;color:var(--text-danger);transition:all .15s;font-family:var(--font-sans)}
  .tl-btn.sel{background:var(--fill-danger);color:#fff;border-color:var(--fill-danger)}
  .injury-panel .desc-label{font-size:12px;color:var(--text-danger);font-weight:500;margin-bottom:4px;display:block}
  .injury-panel textarea{border:0.5px solid var(--border-strong);border-radius:var(--radius);background:var(--surface-2);font-size:13px;color:var(--text-primary);resize:vertical;padding:8px 10px}
  .calc-box{background:var(--surface-1);border:0.5px solid var(--border);border-radius:12px;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
  .calc-label{font-size:13px;color:var(--text-secondary)}
  .calc-val{font-size:22px;font-weight:500;color:var(--text-primary)}
  .calc-unit{font-size:13px;color:var(--text-muted);margin-left:4px}
  .btn-primary{padding:10px 20px;background:var(--fill-accent);color:#fff;border:none;border-radius:var(--radius);font-size:14px;font-weight:500;cursor:pointer;width:100%;font-family:var(--font-sans);transition:background .15s}
  .btn-primary:hover{background:var(--fill-accent-hover)}
  .toast-wrap{height:44px;display:flex;align-items:center;justify-content:center;margin-top:8px}
  .toast{background:var(--text-primary);color:var(--surface-2);padding:8px 18px;border-radius:var(--radius);font-size:13px;opacity:0;transition:opacity .3s;font-family:var(--font-sans)}
  .toast.show{opacity:1}
  .week-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem}
  .week-nav button{padding:6px 16px;font-size:13px;border:0.5px solid var(--border-strong);border-radius:var(--radius);background:var(--surface-2);color:var(--text-primary);cursor:pointer;font-family:var(--font-sans)}
  .week-nav button:hover{background:var(--surface-1)}
  .week-label{font-size:15px;font-weight:500;color:var(--text-primary)}
  .chart-wrap{position:relative;width:100%;height:360px;margin-bottom:1.5rem}
  .legend{display:flex;flex-wrap:wrap;gap:12px;margin-bottom:1rem}
  .legend-item{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--text-secondary)}
  .legend-swatch{width:10px;height:10px;border-radius:2px;flex-shrink:0}
  .stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin-bottom:1.5rem}
  .stat-card{background:var(--surface-1);border-radius:var(--radius);padding:10px 12px}
  .stat-lbl{font-size:11px;color:var(--text-muted);margin-bottom:4px}
  .stat-val{font-size:20px;font-weight:500;color:var(--text-primary)}
  .stat-unit{font-size:13px;font-weight:400;color:var(--text-muted)}
  .injuries-list{margin-top:.5rem}
  .inj-item{padding:10px 0;border-bottom:0.5px solid var(--border);font-size:13px}
  .inj-header{display:flex;align-items:center;gap:8px;margin-bottom:4px;flex-wrap:wrap}
  .badge{font-size:11px;padding:2px 8px;border-radius:10px;white-space:nowrap;font-weight:500}
  .badge-danger{background:var(--bg-danger);color:var(--text-danger)}
  .badge-warning{background:var(--bg-warning);color:var(--text-warning)}
  .empty-state{text-align:center;padding:3rem;color:var(--text-muted);font-size:14px}
  .empty-icon{font-size:40px;margin-bottom:12px}
  @media(max-width:500px){
    .form-grid{grid-template-columns:1fr}
    .form-group.full{grid-column:1}
    .header{padding:12px 16px}
    .container{padding:16px 12px}
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-icon">TKD</div>
  <div>
    <h1>Registro de entrenamiento</h1>
    <p>Ciclo de 22 semanas · inicio 29 jun 2026</p>
  </div>
</div>

<div class="container">
  <div class="tabs">
    <button class="tab active" onclick="showTab('registro')">Registrar sesión</button>
    <button class="tab" onclick="showTab('grafica')">Gráfica semanal</button>
    <button class="tab" onclick="showTab('lesiones')">Lesiones</button>
  </div>

  <!-- REGISTRO -->
  <div id="tab-registro">
    <div class="info-bar">
      <div class="info-chip">📅 <span>Fecha: <strong id="fecha-display">—</strong></span></div>
      <div class="info-chip">📆 <span>Semana del ciclo: <strong id="semana-display">—</strong> / 22</span></div>
      <div class="info-chip">📌 <span>Día: <strong id="dia-display">—</strong></span></div>
    </div>

    <div class="form-grid">
      <div class="form-group">
        <label>Duración (minutos)</label>
        <input type="number" id="inp-duracion" min="1" value="60" oninput="updateCalc()">
      </div>
      <div class="form-group">
        <label>RPE de la sesión (1–10)</label>
        <div class="rpe-row">
          <input type="range" id="inp-rpe" min="1" max="10" step="1" value="5" oninput="updateCalc()">
          <span class="rpe-val" id="rpe-num">5</span>
        </div>
        <span class="rpe-desc" id="rpe-desc">Intensidad moderada</span>
      </div>
      <div class="form-group full">
        <label>Tipo de sesión</label>
        <div class="type-btns" id="type-btns">
          <button class="type-btn" onclick="selType(this,'Fuerza')">Fuerza</button>
          <button class="type-btn" onclick="selType(this,'Resistencia')">Resistencia</button>
          <button class="type-btn" onclick="selType(this,'Técnico-Táctica Personal')">Técnico-Táctica Personal</button>
          <button class="type-btn" onclick="selType(this,'TKD Élites')">TKD Élites</button>
          <button class="type-btn" onclick="selType(this,'TKD Universitario')">TKD Universitario</button>
        </div>
      </div>
    </div>

    <div class="calc-box">
      <div class="calc-label">Carga de sesión (RPE × minutos)</div>
      <div><span class="calc-val" id="carga-val">300</span><span class="calc-unit">UA</span></div>
    </div>

    <div class="form-group" style="margin-bottom:16px">
      <label>¿Hubo lesión o problema de salud durante la sesión?</label>
      <div class="health-row">
        <label class="health-opt"><input type="radio" name="lesion" value="no" checked onchange="toggleLesion()"> No</label>
        <label class="health-opt"><input type="radio" name="lesion" value="si" onchange="toggleLesion()"> Sí</label>
      </div>
      <div class="injury-panel" id="injury-panel" style="display:none">
        <label>⚠️ Tipo de lesión o problema</label>
        <div class="tipo-lesion-btns">
          <button class="tl-btn" onclick="selTipoLesion(this,'Muscular')">Muscular</button>
          <button class="tl-btn" onclick="selTipoLesion(this,'Articular / ligamentosa')">Articular / ligamentosa</button>
          <button class="tl-btn" onclick="selTipoLesion(this,'Tendinosa')">Tendinosa</button>
          <button class="tl-btn" onclick="selTipoLesion(this,'Ósea / contusión')">Ósea / contusión</button>
          <button class="tl-btn" onclick="selTipoLesion(this,'Problema de salud general')">Problema de salud general</button>
          <button class="tl-btn" onclick="selTipoLesion(this,'Otro')">Otro</button>
        </div>
        <span class="desc-label">Descripción detallada</span>
        <textarea id="inp-lesion" rows="3" placeholder="Ej: Dolor en rodilla derecha al ejecutar patadas giratorias, cedió después de calentar..."></textarea>
      </div>
    </div>

    <button class="btn-primary" onclick="guardarSesion()">Guardar sesión</button>
    <div class="toast-wrap"><div class="toast" id="toast"></div></div>
  </div>

  <!-- GRÁFICA -->
  <div id="tab-grafica" style="display:none">
    <div class="week-nav">
      <button onclick="cambiarVista(-1)">&#8592;</button>
      <span class="week-label" id="vista-label">Todas las semanas</span>
      <button onclick="cambiarVista(1)">&#8594;</button>
    </div>
    <div class="legend" id="leyenda"></div>
    <div class="chart-wrap">
      <canvas id="mainChart"></canvas>
    </div>
    <div class="stats-row" id="stats-row"></div>
  </div>

  <!-- LESIONES -->
  <div id="tab-lesiones" style="display:none">
    <p style="font-size:13px;font-weight:500;color:var(--text-muted);text-transform:uppercase;letter-spacing:.04em;margin-bottom:12px">Registro de lesiones y problemas de salud</p>
    <div class="injuries-list" id="injuries-list"></div>
  </div>
</div>

<script>
const INICIO = new Date(2026, 5, 29);
const DIAS_ES = ['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
const DIAS_SEMANA = ['Lunes','Martes','Miércoles','Jueves','Viernes','Sábado','Domingo'];
const TIPOS = ['Fuerza','Resistencia','Técnico-Táctica Personal','TKD Élites','TKD Universitario'];
const COLORES = {'Fuerza':'#2a78d6','Resistencia':'#1baf7a','Técnico-Táctica Personal':'#eda100','TKD Élites':'#4a3aa7','TKD Universitario':'#e34948'};
const RPE_DESC = ['','Muy suave','Suave','Moderado ligero','Moderado','Intensidad moderada','Algo duro','Duro','Muy duro','Muy muy duro','Esfuerzo máximo'];

let sesiones = JSON.parse(localStorage.getItem('tkd-sesiones')||'[]');
let tipoSel = null;
let tipoLesionSel = null;
let vistaOffset = 0;
let chartInst = null;

function guardar(){localStorage.setItem('tkd-sesiones',JSON.stringify(sesiones));}

function getCDMX(){
  return new Date(new Date().toLocaleString('en-US',{timeZone:'America/Mexico_City'}));
}

function calcSemana(fecha){
  const dias = Math.floor((fecha - INICIO) / 86400000);
  if(dias < 0) return null;
  const sem = Math.floor(dias / 7) + 1;
  return sem > 22 ? null : sem;
}

function initFecha(){
  const now = getCDMX();
  const dd = String(now.getDate()).padStart(2,'0');
  const mm = String(now.getMonth()+1).padStart(2,'0');
  const yyyy = now.getFullYear();
  const sem = calcSemana(now);
  document.getElementById('fecha-display').textContent = `${dd}/${mm}/${yyyy}`;
  document.getElementById('dia-display').textContent = DIAS_ES[now.getDay()];
  document.getElementById('semana-display').textContent = sem || '—';
  if(!sem){
    const msg = (now < INICIO) ? 'El ciclo inicia el 29 de junio de 2026' : 'El ciclo de 22 semanas ha finalizado';
    document.getElementById('semana-display').textContent = '—';
    document.querySelector('.info-bar').insertAdjacentHTML('beforeend',`<div class="info-chip" style="color:var(--text-danger)">${msg}</div>`);
  }
}

function getSemanaActual(){return calcSemana(getCDMX());}
function getDiaActual(){return DIAS_ES[getCDMX().getDay()];}

function selType(btn, tipo){
  document.querySelectorAll('.type-btn').forEach(b=>{b.classList.remove('selected');b.style.background='';b.style.borderColor='';b.style.color='';});
  btn.classList.add('selected');
  btn.style.background=COLORES[tipo];btn.style.borderColor=COLORES[tipo];btn.style.color='#fff';
  tipoSel=tipo;
}

function selTipoLesion(btn, tipo){
  document.querySelectorAll('.tl-btn').forEach(b=>b.classList.remove('sel'));
  btn.classList.add('sel');
  tipoLesionSel=tipo;
}

function updateCalc(){
  const rpe=+document.getElementById('inp-rpe').value;
  const dur=+document.getElementById('inp-duracion').value;
  document.getElementById('rpe-num').textContent=rpe;
  document.getElementById('rpe-desc').textContent=RPE_DESC[rpe]||'';
  document.getElementById('carga-val').textContent=Math.round(rpe*(dur||0));
}

function toggleLesion(){
  const v=document.querySelector('input[name=lesion]:checked').value;
  document.getElementById('injury-panel').style.display=v==='si'?'block':'none';
  if(v==='no'){tipoLesionSel=null;document.querySelectorAll('.tl-btn').forEach(b=>b.classList.remove('sel'));document.getElementById('inp-lesion').value='';}
}

function guardarSesion(){
  const semana=getSemanaActual();
  const dia=getDiaActual();
  const dur=+document.getElementById('inp-duracion').value;
  const rpe=+document.getElementById('inp-rpe').value;
  const hayLesion=document.querySelector('input[name=lesion]:checked').value==='si';
  const lesionDesc=document.getElementById('inp-lesion').value.trim();
  if(!semana){showToast('Fuera del rango del ciclo de 22 semanas.');return;}
  if(!dur||dur<1){showToast('Ingresa una duración válida.');return;}
  if(!tipoSel){showToast('Selecciona el tipo de sesión.');return;}
  if(hayLesion&&!tipoLesionSel){showToast('Selecciona el tipo de lesión.');return;}
  if(hayLesion&&!lesionDesc){showToast('Describe la lesión o problema de salud.');return;}
  sesiones.push({semana,dia,dur,rpe,tipo:tipoSel,carga:rpe*dur,lesion:hayLesion,tipoLesion:tipoLesionSel||null,lesionDesc:lesionDesc||null,fecha:new Date().toISOString()});
  guardar();
  showToast('Sesión guardada ✓');
  document.getElementById('inp-duracion').value=60;
  document.getElementById('inp-rpe').value=5;
  document.querySelector('input[name=lesion][value=no]').checked=true;
  document.getElementById('inp-lesion').value='';
  toggleLesion();
  tipoSel=null;tipoLesionSel=null;
  document.querySelectorAll('.type-btn').forEach(b=>{b.classList.remove('selected');b.style.background='';b.style.borderColor='';b.style.color='';});
  updateCalc();
  renderChart();renderStats();renderLesiones();
}

function cambiarVista(dir){
  if(vistaOffset===0&&dir===-1)return;
  if(vistaOffset===22&&dir===1)return;
  if(vistaOffset===0&&dir===1)vistaOffset=1;
  else if(vistaOffset===1&&dir===-1)vistaOffset=0;
  else vistaOffset=Math.max(0,Math.min(22,vistaOffset+dir));
  document.getElementById('vista-label').textContent=vistaOffset===0?'Todas las semanas':`Semana ${vistaOffset}`;
  renderChart();renderStats();
}

function renderChart(){
  const ctx=document.getElementById('mainChart');
  if(chartInst)chartInst.destroy();
  let labels,datasets;
  if(vistaOffset===0){
    labels=Array.from({length:22},(_,i)=>`S${i+1}`);
    datasets=TIPOS.map(tipo=>{
      const data=Array.from({length:22},(_,i)=>sesiones.filter(s=>s.semana===i+1&&s.tipo===tipo).reduce((a,s)=>a+s.carga,0));
      return{label:tipo,data,backgroundColor:COLORES[tipo],stack:'s',borderRadius:3,borderSkipped:false};
    });
  } else {
    labels=DIAS_SEMANA;
    datasets=TIPOS.map(tipo=>{
      const data=DIAS_SEMANA.map(dia=>sesiones.filter(s=>s.semana===vistaOffset&&s.dia===dia&&s.tipo===tipo).reduce((a,s)=>a+s.carga,0));
      return{label:tipo,data,backgroundColor:COLORES[tipo],stack:'d',borderRadius:3,borderSkipped:false};
    });
  }
  document.getElementById('leyenda').innerHTML=TIPOS.map(t=>`<span class="legend-item"><span class="legend-swatch" style="background:${COLORES[t]}"></span>${t}</span>`).join('');
  chartInst=new Chart(ctx,{
    type:'bar',data:{labels,datasets},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{callbacks:{
        label:c=>c.parsed.y>0?`${c.dataset.label}: ${Math.round(c.parsed.y)} UA`:'',
        footer:items=>{const t=items.reduce((a,i)=>a+(i.parsed.y||0),0);return t>0?`Total: ${Math.round(t)} UA`:'';}
      }}},
      scales:{
        x:{ticks:{font:{size:12},color:'#898781',autoSkip:false,maxRotation:vistaOffset===0?45:0},grid:{display:false}},
        y:{ticks:{font:{size:12},color:'#898781',callback:v=>v===0?'':v+' UA'},grid:{color:getComputedStyle(document.documentElement).getPropertyValue('--border')||'rgba(0,0,0,0.08)',lineWidth:1},title:{display:true,text:'Carga (UA)',color:'#898781',font:{size:11}}}
      }
    }
  });
}

function renderStats(){
  const data=vistaOffset===0?sesiones:sesiones.filter(s=>s.semana===vistaOffset);
  const total=data.reduce((a,s)=>a+s.carga,0);
  const n=data.length;
  const prom=n>0?Math.round(total/n):0;
  const lesN=data.filter(s=>s.lesion).length;
  document.getElementById('stats-row').innerHTML=`
    <div class="stat-card"><div class="stat-lbl">Carga total</div><div class="stat-val">${Math.round(total).toLocaleString()} <span class="stat-unit">UA</span></div></div>
    <div class="stat-card"><div class="stat-lbl">Sesiones</div><div class="stat-val">${n}</div></div>
    <div class="stat-card"><div class="stat-lbl">Carga promedio</div><div class="stat-val">${prom} <span class="stat-unit">UA</span></div></div>
    <div class="stat-card"><div class="stat-lbl">Lesiones</div><div class="stat-val" style="${lesN>0?'color:var(--text-danger)':''}">${lesN}</div></div>
  `;
}

function renderLesiones(){
  const list=[...sesiones].filter(s=>s.lesion).reverse();
  const el=document.getElementById('injuries-list');
  if(!list.length){
    el.innerHTML='<div class="empty-state"><div class="empty-icon">🛡️</div>Sin lesiones registradas.</div>';
    return;
  }
  el.innerHTML=list.map(s=>`
    <div class="inj-item">
      <div class="inj-header">
        <span class="badge badge-danger">Semana ${s.semana} · ${s.dia}</span>
        ${s.tipoLesion?`<span class="badge badge-warning">${s.tipoLesion}</span>`:''}
        <span style="font-size:13px;font-weight:500;color:var(--text-primary)">${s.tipo}</span>
      </div>
      <div style="color:var(--text-secondary);font-size:13px">${s.lesionDesc}</div>
    </div>
  `).join('');
}

function showTab(t){
  ['registro','grafica','lesiones'].forEach(id=>{
    document.getElementById('tab-'+id).style.display=id===t?'':'none';
  });
  document.querySelectorAll('.tab').forEach((btn,i)=>{
    btn.classList.toggle('active',['registro','grafica','lesiones'][i]===t);
  });
  if(t==='grafica'){renderChart();renderStats();}
  if(t==='lesiones')renderLesiones();
}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2400);
}

initFecha();
updateCalc();
renderChart();renderStats();renderLesiones();
</script>
</body>
</html>
